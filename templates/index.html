<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта с панорамами</title>

<!-- Leaflet (OpenStreetMap) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Pannellum: 360°-вьювер для собранных панорам (JPG отдаёт наш Flask-бэкенд) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="app" data-is-admin="{{ 'true' if is_admin else 'false' }}" data-map-center="{{ '57.1509,65.5273' }}">


  <header class="topbar">
      <h1 id="app-title" data-i18n="appTitle">Точки с панорамами</h1>


    <div class="admin-controls">
      <div class="lang-controls">
        <button id="btn-lang-ru" class="btn btn-ghost btn-lang active" type="button">RU</button>
        <button id="btn-lang-en" class="btn btn-ghost btn-lang" type="button">EN</button>
      </div>
      <span id="admin-status" class="admin-status {{ 'on' if is_admin else '' }}">
        {{ 'Режим администратора включён' if is_admin else 'Режим просмотра' }}
      </span>


      <button id="btn-current-location" class="btn btn-ghost" type="button" data-i18n="currentLocation">
        Текущее местоположение
      </button>


      {% if is_admin %}
        <button id="btn-add-mode" class="btn btn-primary">Добавить точку</button>
        <button id="btn-logout" class="btn btn-ghost">Выйти из админки</button>
      {% else %}
        <button id="btn-login" class="btn btn-ghost">Вход для администратора</button>
      {% endif %}



    </div>
  </header>

  <div id="map"></div>

  <!-- Модалка входа админа -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-card">
          <h2 data-i18n="adminLoginTitle">Вход администратора</h2>

      <input id="login-password" type="password" placeholder="Пароль">
      <div class="modal-actions">
      <button id="login-submit" class="btn btn-primary" data-i18n="login">Войти</button>
        <button class="btn btn-ghost js-close-modal" data-i18n="cancel">Отмена</button>

      </div>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Модалка добавления точки (только админ) -->
  <div id="add-point-modal" class="modal hidden">
    <div class="modal-card wide">
      <h2>Новая точка</h2>
      <p class="hint">Координаты: <span id="add-point-coords"></span></p>

      <label>Название</label>
      <input id="add-point-title" type="text" placeholder="Например: Смотровая площадка">

      <label>Описание (необязательно)</label>
      <textarea id="add-point-description" rows="2" placeholder="Комментарий для посетителей"></textarea>

      <div id="panorama-preview" class="panorama-box"></div>
      <p id="panorama-status" class="hint"></p>

      <div class="modal-actions">
        <button id="add-point-submit" class="btn btn-primary">Сохранить точку</button>
        <button class="btn btn-ghost js-close-modal">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Модалка просмотра панорамы существующей точки -->
  <div id="view-point-modal" class="modal hidden">
    <div class="modal-card wide">
      <div class="view-layout">
        <div class="view-left">
          <h2 id="view-point-title"></h2>
          <p id="view-point-description" class="hint"></p>
      <div id="view-panorama" class="panorama-box"></div>
      <p id="view-panorama-status" class="hint"></p>
      <div id="view-panorama-loading" class="hidden">
        <p class="hint">Загрузка панорамы…</p>
      </div>
        </div>

        <aside class="view-right">
          <h3>Сводка по БД</h3>
          <div id="poi-summary" class="poi-summary">
            <p class="hint">Ожидаем данные о ближайших объектах…</p>
          </div>
        </aside>
      </div>

      <div class="modal-actions">
        <button id="view-point-reload" class="btn btn-ghost" type="button">
          {{ 'Перезагрузить панораму' if not is_admin else 'Перезагрузить панораму' }}
        </button>
        {% if is_admin %}
          <button id="view-point-delete" class="btn btn-danger" data-i18n="deletePoint">Удалить точку</button>
        {% endif %}
        <button class="btn btn-ghost js-close-modal" data-i18n="close">Закрыть</button>

      </div>
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
